version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: ribe_boys_db
    environment:
      POSTGRES_DB: ribe_boys
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password_here
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: ribe_boys_redis
    ports:
      - "6379:6379"

  server:
    build: ./server
    container_name: ribe_boys_api
    environment:
      DATABASE_URL: postgresql://admin:password_here@database:5432/ribe_boys?schema=public
      JWT_SECRET: your_secret_key
      OPENAI_API_KEY: your_openai_key
      AT_USERNAME: your_at_username
      AT_API_KEY: your_at_api_key
      MPESA_CONSUMER_KEY: your_mpesa_key
      MPESA_CONSUMER_SECRET: your_mpesa_secret
    ports:
      - "3001:3001"
    depends_on:
      - database
      - redis

  public_website:
    build: ./client/public-website
    container_name: ribe_boys_public
    environment:
      NEXT_PUBLIC_API_URL: http://server:3001
    ports:
      - "3000:3000"
    depends_on:
      - server

  dashboard:
    build: ./client/dashboard
    container_name: ribe_boys_dashboard
    environment:
      NEXT_PUBLIC_API_URL: http://server:3001
    ports:
      - "3002:3002"
    depends_on:
      - server

  nginx:
    image: nginx:alpine
    container_name: ribe_boys_nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - public_website
      - dashboard

volumes:
  postgres_data:
